name: Auto Video Pipeline

on:
  schedule:
    - cron: "0 0,6,10,14,18 * * *"  # UTC times
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: auto-video-pipeline
  cancel-in-progress: false

jobs:
  run-script:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      # ✅ System dependencies (combined + updated)
      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick

      # ✅ Fix ImageMagick permission issue (critical for TextClip)
      - name: Configure ImageMagick
        run: |
          sudo sed -i 's/rights="none"/rights="read|write"/g' /etc/ImageMagick-6/policy.xml

      # ✅ Single source of truth for Python deps
      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Create cookies file
        run: |
          echo "${{ secrets.YOUTUBE_COOKIES }}" > ai-video-generator/src/data/cookies.txt
      
      # ✅ Restore YouTube auth files
      - name: Create YouTube token file
        run: |
          echo '${{ secrets.YOUTUBE_TOKEN }}' > ai-video-uploader/src/token.json

      - name: Create YouTube client secret file
        run: |
          echo '${{ secrets.YOUTUBE_CLIENT_SECRET }}' > ai-video-uploader/src/client_secret.json

      # ✅ Run pipeline (unbuffered logs)
      - name: Run pipeline
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python -u orchestrator.py

      # ✅ Commit updated tracking file (only if changed)
      - name: Commit updated topics
        if: success()
        run: |
          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add ai-video-generator/src/data/

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "auto: update used videos list"
          git pull --rebase origin main
          git push origin HEAD:main